[app]
# Timezone used for display and output folder naming.
timezone = "Asia/Shanghai"
# Papers older than this window will be ignored.
lookback_hours = 24
# Relative paths are resolved from the config file location.
output_dir = "output"
# arXiv recommends spacing requests instead of polling aggressively.
request_delay_seconds = 3

[state]
# Keep track of papers that were already included in previous digests.
enabled = true
# This default path works well with the scheduled GitHub Actions workflow.
path = ".paper-digest-state/state.json"
# Drop old state entries after this many days.
retention_days = 90

[analysis]
# Optional LLM-powered digest enhancement. Leave disabled until you have an API key.
enabled = false
provider = "openai"
model = "gpt-5-mini"
api_key_env = "OPENAI_API_KEY"
base_url = "https://api.openai.com/v1/responses"
timeout_seconds = 60
# Analyze at most this many newly selected papers per run.
max_papers = 8
max_output_tokens = 600
# Number of top-of-digest highlight lines to render.
top_highlights = 3
# Number of feed-level "key points" lines to render before the paper list.
feed_key_points = 3
# Output language for LLM-written fields.
language = "English"
# Use "none" to skip reasoning settings entirely.
reasoning_effort = "minimal"
# Rendering style for Markdown, email, and Feishu output.
# Use "zh_daily_brief" with language = "Chinese" for a Chinese daily report.
template = "default"

[[feeds]]
# Free-form label used in the generated digest.
name = "LLM"
# Supported sources: arxiv, crossref
source = "arxiv"
# arXiv categories: https://arxiv.org/category_taxonomy
categories = ["cs.AI", "cs.CL", "cs.LG"]
# Keep a paper if any keyword matches its title or abstract.
keywords = ["agent", "reasoning", "alignment", "benchmark", "evaluation"]
# Drop a paper if any excluded keyword matches.
exclude_keywords = ["survey", "tutorial"]
# Number of newest candidates to fetch before local filtering.
max_results = 100
# Number of items to keep in the final digest.
max_items = 15

[[feeds]]
name = "Vision"
source = "arxiv"
categories = ["cs.CV"]
keywords = ["diffusion", "video generation", "multimodal", "segmentation"]
exclude_keywords = []
max_results = 100
max_items = 10

# Example Crossref feed:
# [[feeds]]
# name = "Crossref AI"
# source = "crossref"
# queries = ["agent reasoning benchmark"]
# types = ["journal-article", "proceedings-article"]
# keywords = ["agent", "reasoning"]
# exclude_keywords = []
# max_results = 50
# max_items = 10

# Preferred notification configuration uses [[deliveries]].

# Example SMTP delivery:
# [[deliveries]]
# type = "email"
# smtp_host = "smtp.example.com"
# smtp_port = 465
# username = "bot@example.com"
# password_env = "PAPER_DIGEST_SMTP_PASSWORD"
# from_address = "bot@example.com"
# to_addresses = ["you@example.com"]
# use_tls = true
# use_starttls = false
# subject_prefix = "[Paper Digest]"
# skip_if_empty = true
# target = "digest"

# Example Feishu webhook delivery:
# [[deliveries]]
# type = "feishu_webhook"
# webhook_url = "https://open.feishu.cn/open-apis/bot/v2/hook/your-token"
# title_prefix = "[Paper Digest]"
# skip_if_empty = true
# target = "per_feed"

# Legacy email configuration is still supported:
# [email]
# enabled = false
# smtp_host = "smtp.example.com"
# smtp_port = 465
# username = "bot@example.com"
# password_env = "PAPER_DIGEST_SMTP_PASSWORD"
# from_address = "bot@example.com"
# to_addresses = ["you@example.com"]
# use_tls = true
# use_starttls = false
# subject_prefix = "[Paper Digest]"
# skip_if_empty = true
# target = "digest"
