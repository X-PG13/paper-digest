name: Daily Digest

on:
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: paper-digest-pages
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install .

      - name: Restore digest state cache
        id: state-restore
        uses: actions/cache/restore@v4
        with:
          path: .paper-digest-state
          key: paper-digest-state-${{ github.run_id }}
          restore-keys: |
            paper-digest-state-

      - name: Materialize config
        env:
          PAPER_DIGEST_CONFIG_TOML: ${{ secrets.PAPER_DIGEST_CONFIG_TOML }}
        run: |
          if [ -z "$PAPER_DIGEST_CONFIG_TOML" ]; then
            echo "Missing PAPER_DIGEST_CONFIG_TOML repository secret." >&2
            exit 1
          fi
          printf '%s\n' "$PAPER_DIGEST_CONFIG_TOML" > config.toml

      - name: Run digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PAPER_DIGEST_SMTP_PASSWORD: ${{ secrets.PAPER_DIGEST_SMTP_PASSWORD }}
        run: python -m paper_digest --config config.toml

      - name: Upload digest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-output
          path: output/
          if-no-files-found: ignore

      - name: Configure Pages
        if: success()
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: success() && hashFiles('output/site/**') != ''
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/site

      - name: Save digest state cache
        if: always() && hashFiles('.paper-digest-state/**') != ''
        uses: actions/cache/save@v4
        with:
          path: .paper-digest-state
          key: paper-digest-state-${{ github.run_id }}

  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: digest
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
